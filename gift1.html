<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memories 🧸</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="love-page">
    
    <!-- Floating Pookie Emojis -->
    <div class="hearts-bg">
        <div class="heart" style="--left: 15%; --delay: 0s; --size: 30px;">🧸</div>
        <div class="heart" style="--left: 45%; --delay: 2s; --size: 25px;">🎀</div>
        <div class="heart" style="--left: 75%; --delay: 1s; --size: 35px;">🌸</div>
    </div>

    <div class="full-template-container">
        <button class="back-btn" onclick="location.href='index.html'">◀ Back</button>
        
        <h1 class="love-heading">Our Beautiful Journey 🎀</h1>

        <!-- Mast Frames me Photos -->
        <div class="love-frames-grid">
            <div class="pookie-frame frame-left">
                <img src="assets/photo1.jpg" alt="Memory 1">
                <span class="ribbon">🎀</span>
            </div>
            <div class="pookie-frame frame-right">
                <img src="assets/photo2.jpg" alt="Memory 2">
                <span class="ribbon">🌸</span>
            </div>
        </div>

        <!-- Animated Message Box -->
        <div class="animated-message-box">
            <p class="animated-text">
                Happy Birthday my love! 🎂<br><br>
                Aap meri life ke sabse pyaare pookie ho! Jabse aap aaye ho, sab kuch kitna khoobsurat ho gaya hai. 🧸✨<br><br>
                Main hamesha aapko aise hi pareshan karta rahunga aur dher saara pyaar karta rahunga! ❤️
            </p>
        </div>
    </div>

</body>
</html>
