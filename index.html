<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="bg-music" loop>
        <source src="assets/music.mp3" type="audio/mpeg">
    </audio>

    <div class="hearts-bg">
        <div class="heart" style="--left: 10%; --delay: 0s; --size: 30px;">❤️</div>
        <div class="heart" style="--left: 30%; --delay: 2s; --size: 24px;">🎀</div>
        <div class="heart" style="--left: 50%; --delay: 4s; --size: 35px;">💕</div>
        <div class="heart" style="--left: 70%; --delay: 1s; --size: 26px;">🧸</div>
        <div class="heart" style="--left: 85%; --delay: 5s; --size: 20px;">💖</div>
    </div>

    <!-- SECTION 1: PASSCODE LOCK SCREEN -->
    <div id="lock-screen" class="screen">
        <div class="lock-container">
            <div class="image-frame">
                <img src="assets/penguin.jpg" alt="Cute Penguin" id="profile-pic">
            </div>
            <h2>Enter a passcode</h2>
            <div class="passcode-display">
                <span class="dot" id="dot-1"></span>
                <span class="dot" id="dot-2"></span>
                <span class="dot" id="dot-3"></span>
                <span class="dot" id="dot-4"></span>
            </div>
            <div class="keypad">
                <button class="key" onclick="pressKey('1')">1</button>
                <button class="key" onclick="pressKey('2')">2</button>
                <button class="key" onclick="pressKey('3')">3</button>
                <button class="key" onclick="pressKey('4')">4</button>
                <button class="key" onclick="pressKey('5')">5</button>
                <button class="key" onclick="pressKey('6')">6</button>
                <button class="key" onclick="pressKey('7')">7</button>
                <button class="key" onclick="pressKey('8')">8</button>
                <button class="key" onclick="pressKey('9')">9</button>
                <button class="key" onclick="clearPasscode()">*</button>
                <button class="key" onclick="pressKey('0')">0</button>
                <button class="key" onclick="clearPasscode()">#</button>
            </div>
            <p id="error-message" style="color: #ffb3b3; display: none; margin-top: 15px;">Wrong Passcode! Try again.</p>
        </div>
    </div>

    <!-- SECTION 2: GIFTS SCREEN -->
    <div id="main-content" class="screen hidden">
        <div class="gifts-container">
            <h1 class="title-text">CLICK ON GIFTS TO OPEN 🎀</h1>
            <div class="gifts-row">
                <!-- Ab ye seedha naye page par bhejenge -->
                <div class="gift-box" onclick="location.href='gift1.html'">
                    <img src="assets/gift.png" alt="Gift 1">
                </div>
                <div class="gift-box" onclick="location.href='gift2.html'">
                    <img src="assets/gift.png" alt="Gift 2">
                </div>
                <div class="gift-box" onclick="location.href='gift3.html'">
                    <img src="assets/gift.png" alt="Gift 3">
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
